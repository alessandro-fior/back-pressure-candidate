spring:
  application:
    name: control-plane
  jackson:
    deserialization:
      fail-on-unknown-properties: true

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

backpressure:
  generator:
    base-url: ${BACKPRESSURE_GENERATOR_BASE_URL:http://localhost:8081}
  decoder:
    base-url: ${BACKPRESSURE_DECODER_BASE_URL:http://localhost:8082}
